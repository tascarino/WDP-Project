<!DOCTYPE html>

  <main class="container">
    <h2>&#9734;Register Your Account&#9734;</h2>
    <form>
      <label for="fname">First Name: </label>
      <input type="text" id="fname">
      <br>
      <label for="lname">Last Name: </label>

      <br><br>
      <input type="submit" value="Register">
    </form>
  </main>
